<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded background (Maskable friendly) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer glowing ring accent -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#60a5fa" stroke-width="6" stroke-opacity="0.3" />

  <!-- Stylized Box Isometric View -->
  <g transform="translate(136, 130)">
    <!-- Top Face of the Box -->
    <path d="M 120 110 L 240 40 L 120 -30 L 0 40 Z" fill="url(#boxGrad)" />
    
    <!-- Left Face of the Box -->
    <path d="M 120 210 L 0 140 L 0 40 L 120 110 Z" fill="#cbd5e1" />
    
    <!-- Right Face of the Box -->
    <path d="M 120 210 L 240 140 L 240 40 L 120 110 Z" fill="#94a3b8" />
    
    <!-- Box Seam Detailing -->
    <path d="M 120 110 L 120 210" stroke="#475569" stroke-width="5" stroke-linecap="round" />
    <path d="M 0 40 L 120 110 L 240 40" fill="none" stroke="#cbd5e1" stroke-width="3" />
    
    <!-- Smart Warehouse Glowing Arrows -->
    <path d="M 60 75 L 120 110 L 180 75" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <path d="M 120 40 L 120 110" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  </g>
  
  <!-- Glowing Dots / Signal Waves -->
  <circle cx="256" cy="75" r="8" fill="#60a5fa" filter="url(#glow)" />
  <circle cx="100" cy="256" r="6" fill="#60a5fa" opacity="0.6" />
  <circle cx="412" cy="256" r="6" fill="#60a5fa" opacity="0.6" />
</svg>
